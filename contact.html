<body class="bg-brand-gray text-slate-900 flex flex-col min-h-screen">

    <main class="flex-grow pt-32 md:pt-48 pb-16 md:pb-24 px-6 animate-fade-in">

                <p class="text-xl text-gray-600 font-medium leading-relaxed mb-12">

                <div class="space-y-8 text-lg font-bold text-slate-900">

                        </div>
                        <div>
                            <div class="text-[10px] text-gray-400 tracking-widest uppercase mb-1">Call or Text</div>
                            <a href="tel:07396710347" class="hover:text-brand-teal transition-colors">07396 710 347</a>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 bg-white p-6 rounded-2xl border-2 border-gray-200 shadow-sm">
                        <div class="w-12 h-12 rounded-full bg-brand-teal text-slate-900 flex items-center justify-center text-xl">

                        <div>

                            <a href="mailto:info@made-real.co.uk" class="hover:text-brand-teal transition-colors">info@made-real.co.uk</a>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 bg-white p-6 rounded-2xl border-2 border-gray-200 shadow-sm">
                        <div class="w-12 h-12 rounded-full bg-slate-900 text-white flex items-center justify-center text-xl">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div>
                            <div class="text-[10px] text-gray-400 tracking-widest uppercase mb-1">HQ</div>
                            <span>9 Market St, Colne, BB8 0HY</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-8 md:p-12 rounded-[32px] shadow-hard border-4 border-slate-900">
                <h3 class="text-3xl font-black tracking-tight text-slate-900 mb-8 uppercase">Send a Message</h3>
                <form class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Name</label>
                        <input type="text" class="w-full bg-brand-gray border-2 border-gray-200 text-slate-900 rounded-xl p-4 font-medium focus:outline-none focus:border-slate-900 transition-all placeholder-gray-400" placeholder="Your Name">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Email Address</label>
                        <input type="email" class="w-full bg-brand-gray border-2 border-gray-200 text-slate-900 rounded-xl p-4 font-medium focus:outline-none focus:border-slate-900 transition-all placeholder-gray-400" placeholder="your@email.com">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Message</label>
                        <textarea rows="4" class="w-full bg-brand-gray border-2 border-gray-200 text-slate-900 rounded-xl p-4 font-medium focus:outline-none focus:border-slate-900 transition-all placeholder-gray-400" placeholder="How can we help?"></textarea>
                    </div>
                    <button type="button" class="w-full bg-slate-900 text-white font-black text-lg px-8 py-4 rounded-xl hover:bg-brand-teal hover:text-slate-900 transition-colors uppercase tracking-wide border-2 border-transparent hover:border-slate-900">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </main>

    [[[INJECT_FOOTER]]]


    <script>
        // Header Mobile Menu Functions
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenuClose = document.getElementById('mobile-menu-close');
        const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileServicesToggle = document.getElementById('mobile-services-toggle');
        const mobileLocationsToggle = document.getElementById('mobile-locations-toggle');
        const mobileServicesContent = document.getElementById('mobile-services-content');
        const mobileLocationsContent = document.getElementById('mobile-locations-content');
        const mobileServicesIcon = document.getElementById('mobile-services-icon');
        const mobileLocationsIcon = document.getElementById('mobile-locations-icon');

        function openMobileMenu() {
            mobileMenu.classList.remove('translate-x-full');
            setTimeout(() => {
                mobileMenuOverlay.classList.remove('hidden');
                setTimeout(() => {
                    mobileMenuOverlay.classList.remove('opacity-0');
                }, 10);
            }, 10);
        }

        function closeMobileMenu() {
            mobileMenuOverlay.classList.add('opacity-0');
            mobileMenu.classList.add('translate-x-full');
            setTimeout(() => {
                mobileMenuOverlay.classList.add('hidden');
            }, 300);
        }

        if (mobileMenuBtn) mobileMenuBtn.addEventListener('click', openMobileMenu);
        if (mobileMenuClose) mobileMenuClose.addEventListener('click', closeMobileMenu);
        if (mobileMenuOverlay) mobileMenuOverlay.addEventListener('click', closeMobileMenu);

        if (mobileServicesToggle && mobileServicesContent && mobileServicesIcon) {
            mobileServicesToggle.addEventListener('click', () => {
                mobileServicesContent.classList.toggle('hidden');
                mobileServicesIcon.classList.toggle('rotate-180');
            });
        }

        if (mobileLocationsToggle && mobileLocationsContent && mobileLocationsIcon) {
            mobileLocationsToggle.addEventListener('click', () => {
                mobileLocationsContent.classList.toggle('hidden');
                mobileLocationsIcon.classList.toggle('rotate-180');
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !mobileMenu.classList.contains('translate-x-full')) {
                closeMobileMenu();
            }
        });
    </script>
</body>
</html>
